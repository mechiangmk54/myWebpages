<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教學工具集</title>
    <link rel="stylesheet" href="style.css?v=6">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
    <div id="main-menu" class="container fade-in">
        <div class="header">
            <h1>教學工具集</h1>
            <p style="color: var(--text-muted); margin-bottom: 30px;">探索互動式學習工具與視覺化介面</p>
        </div>
        <div class="tool-grid">
            <div class="card tool-card" id="btn-graphing">
                <div class="tool-icon">📈</div>
                <h2>畫圖工具</h2>
                <p>畫圖功能支援二元一次方程式及不等式。</p>
            </div>
            <div class="card tool-card" id="btn-proportions">
                <div class="tool-icon">⚖️</div>
                <h2>圖示正比與反比</h2>
                <p>正比與反比關係的圖形對照與互動表格。</p>
            </div>
        </div>
    </div>

    <div id="graph-tool-view" class="tool-view hidden" style="display: none;">
        <div class="toolbar">
            <button id="back-btn" class="icon-btn" aria-label="返回">← 返回選單</button>
            <h2>畫圖工具 (Graphing Calculator)</h2>
            <div class="zoom-controls">
                <button class="icon-btn toggle-wb-btn" title="開啟白板">🖋️ 白板筆</button>
                <button id="zoom-in" class="icon-btn" title="放大">➕ 放大</button>
                <button id="zoom-out" class="icon-btn" title="縮小">➖ 縮小</button>
                <button id="reset-view" class="icon-btn" title="重置畫面">🏠 重置</button>
            </div>
        </div>

        <div class="graph-layout">
            <div class="sidebar card">
                <h3>方程式清單</h3>
                <div class="eq-input-group">
                    <input type="text" id="new-eq-input" placeholder="例如: 2x + 3y = 6">
                    <button id="add-eq-btn">加入</button>
                </div>
                <ul id="eq-list"></ul>
            </div>
            <div class="canvas-container card">
                <canvas id="graph-canvas"></canvas>
            </div>
        </div>
    </div>

    <div id="proportions-tool-view" class="tool-view hidden" style="display: none;">
        <div class="toolbar">
            <button id="prop-back-btn" class="icon-btn" aria-label="返回">← 返回選單</button>
            <h2>圖示正比與反比</h2>
            <div class="zoom-controls">
                <button class="icon-btn toggle-wb-btn" title="開啟白板">🖋️ 白板筆</button>
            </div>
        </div>

        <div class="prop-layout">
            <div class="prop-half card">
                <div class="prop-header">
                    <h3>【正比】鉛筆總價問題</h3>
                    <p style="color: var(--text-muted); font-size: 0.9em;">一支鉛筆 10 元，X 支鉛筆總共 Y 元。</p>
                </div>
                <div class="prop-content">
                    <div class="prop-table-container">
                        <table class="prop-table" id="direct-table">
                            <thead>
                                <tr>
                                    <th>X (支)</th>
                                    <th>Y (元)</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                    <div class="prop-canvas-container">
                        <canvas id="direct-canvas"></canvas>
                    </div>
                </div>
            </div>

            <div class="prop-half card">
                <div class="prop-header">
                    <h3>【反比】土地面積問題</h3>
                    <p style="color: var(--text-muted); font-size: 0.9em;">一塊土地面積總共是 120 平方公尺，長度是 X 公尺，寬度是 Y 公尺。</p>
                </div>
                <div class="prop-content">
                    <div class="prop-table-container">
                        <table class="prop-table" id="inverse-table">
                            <thead>
                                <tr>
                                    <th>X (公尺)</th>
                                    <th>Y (公尺)</th>
                                    <th>X × Y</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                    <div class="prop-canvas-container">
                        <canvas id="inverse-canvas"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <canvas id="whiteboard-canvas"></canvas>
    <div id="whiteboard-controls" class="card fade-in" style="display: none;">
        <div style="display: flex; gap: 10px; justify-content: center;">
            <button class="color-btn" style="background: #ef4444;" data-color="#ef4444"></button>
            <button class="color-btn" style="background: #3b82f6;" data-color="#3b82f6"></button>
            <button class="color-btn" style="background: #10b981;" data-color="#10b981"></button>
            <button class="color-btn" style="background: #f59e0b;" data-color="#f59e0b"></button>
            <button class="color-btn" style="background: #f8fafc;" data-color="#f8fafc"></button>
        </div>
        <div class="wb-divider" style="width: 1px; height: 30px; background: rgba(255,255,255,0.2);"></div>
        <div style="display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;">
            <button id="wb-undo" class="icon-btn">↩️ 復原</button>
            <button id="wb-clear" class="icon-btn">🗑️ 清除</button>
            <button id="wb-close" class="icon-btn">❌ 關閉</button>
        </div>
    </div>

    <script src="script.js?v=6"></script>
</body>

</html>
